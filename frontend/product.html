<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="product-body">

<!-- NAVBAR -->
<header class="product-navbar">
    <div class="nav-left">
        <a href="shop.html" class="back-btn">⬅</a>
        <h2 class="logo">Handmade Market</h2>
    </div>
</header>

<!-- PRODUCT SECTION -->
<section class="product-container">

    <!-- IMAGES -->
    <div class="product-images">

        <img class="main-img" id="product-image" src="images/crochet purse.jpeg">

        <div class="thumbnail-row"></div>

    </div>

    <!-- DETAILS -->
    <div class="product-details">

        <h1 id="product-name">Product Name</h1>

        <!-- Rating -->
        <div class="star-rating">
            <span onclick="rate(1)">⭐</span>
            <span onclick="rate(2)">⭐</span>
            <span onclick="rate(3)">⭐</span>
            <span onclick="rate(4)">⭐</span>
            <span onclick="rate(5)">⭐</span>
        </div>

        <p id="rating-result"></p>

        <h2 class="price" id="product-price">₹0</h2>

        <p class="description">
            Beautiful handmade product crafted by artisans.
        </p>

        <!-- Quantity -->
        <div class="quantity-box">
            <button onclick="changeQty(-1)">-</button>
            <input type="number" id="qty" value="1" min="1">
            <button onclick="changeQty(1)">+</button>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button onclick="addToCart()">Add to Cart</button>
            <button onclick="buyNow()">Buy Now</button>
        </div>

    </div>

</section>

<!-- PRODUCT DETAILS -->
<section class="product-info-section">
    <h3>Product Details</h3>
    <ul></ul>
</section>

<!-- REVIEWS -->
<section class="reviews"></section>

<!-- SIMILAR -->
<section class="similar">
    <h3>Similar Products</h3>
    <div class="similar-row"></div>
</section>

<!-- JS -->
<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const image = params.get("image");
const type = params.get("type");

// basic
if(name) document.getElementById("product-name").innerText = name;
if(price) document.getElementById("product-price").innerText = "₹" + price;
if(image) document.getElementById("product-image").src = image;

// DATA
const data = {

    purse: {
        details: `
        <li>Material: Cotton Yarn</li>
        <li>Handmade by Women Artisans</li>
        <li>Lightweight & Stylish</li>
        `,
        reviews: `
        <h3>Customer Reviews</h3>
        <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Anita:</b> Beautiful purse ❤️</p></div>
        <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Pooja:</b> Worth the price 👍</p></div>
        `,
        images: [
            "images/croc purse1.jpeg",
            "images/croc purse 2.jpeg",
            "images/croc purse 3.jpeg"
        ],
        similar: `
        <div class="similar-card"><img src="images/purse1.jpeg"><p>Handmade Bag</p><span>₹1499</span></div>
        <div class="similar-card"><img src="images/purse2.jpeg"><p>Red Purse</p><span>₹1799</span></div>
        `
    },

    saree: {
        details: `
        <li>Material: Cotton Silk</li>
        <li>Madhubani Hand Paint</li>
        <li>Perfect for Festive Wear</li>
        `,
        reviews: `
        <h3>Customer Reviews</h3>
        <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Riya:</b> Stunning saree 😍</p></div>
        <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Neha:</b> Loved the print!</p></div>
        `,
        images: [
            "images/saree1.jpeg",
            "images/saree2.jpeg",
            "images/saree3.jpeg"
        ],
        similar: `
        <div class="similar-card"><img src="images/saree4.jpeg"><p>Silk Saree</p><span>₹2500</span></div>
        <div class="similar-card"><img src="images/saree5.jpeg"><p>Printed Saree</p><span>₹1800</span></div>
        `
    }

};

// APPLY
if(type && data[type]){

    document.querySelector(".product-info-section ul").innerHTML = data[type].details;

    document.querySelector(".reviews").innerHTML = data[type].reviews;

    const thumbRow = document.querySelector(".thumbnail-row");
    thumbRow.innerHTML = "";

    data[type].images.forEach(img => {
        thumbRow.innerHTML += `<img src="${img}" onclick="changeImage(this)">`;
    });

    document.querySelector(".similar-row").innerHTML = data[type].similar;
}

// thumbnail click
function changeImage(el){
    document.getElementById("product-image").src = el.src;
}

// rating
function rate(stars){
    document.getElementById("rating-result").innerText =
    "You rated " + stars + " stars";
}

// qty
function changeQty(val){
    let qty = document.getElementById("qty");
    let current = parseInt(qty.value);
    if(current + val >= 1){
        qty.value = current + val;
    }
}

// cart
function addToCart(){
    alert("Added to cart ✅");
}

function buyNow(){
    alert("Proceeding to buy 🚀");
}

</script>

</body>
</html>
