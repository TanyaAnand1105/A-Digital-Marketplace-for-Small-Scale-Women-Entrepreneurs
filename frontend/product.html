<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="product-body">

<header class="product-navbar">
    <div class="nav-left">
        <a href="shop.html" class="back-btn">⬅</a>
        <h2 class="logo">Handmade Market</h2>
    </div>
</header>

<section class="product-container">

    <!-- IMAGES -->
    <div class="product-images">
        <img class="main-img" id="product-image">
        <div class="thumbnail-row"></div>
    </div>

    <!-- DETAILS -->
    <div class="product-details">

        <h1 id="product-name"></h1>

        <div class="star-rating">
            <span onclick="rate(1)">⭐</span>
            <span onclick="rate(2)">⭐</span>
            <span onclick="rate(3)">⭐</span>
            <span onclick="rate(4)">⭐</span>
            <span onclick="rate(5)">⭐</span>
        </div>

        <p id="rating-result"></p>

        <h2 id="product-price"></h2>

        <p class="description">
            Beautiful handmade product crafted by artisans.
        </p>

        <div class="quantity-box">
            <button onclick="changeQty(-1)">-</button>
            <input type="number" id="qty" value="1" min="1">
            <button onclick="changeQty(1)">+</button>
        </div>

        <div class="buttons">
            <button onclick="addToCart()">Add to Cart</button>
            <button onclick="buyNow()">Buy Now</button>
        </div>

    </div>

</section>

<!-- DETAILS -->
<section class="product-info-section">
    <h3>Product Details</h3>
    <ul></ul>
</section>

<!-- REVIEWS -->
<section class="reviews"></section>

<!-- SIMILAR -->
<section class="similar">
    <h3>Similar Products</h3>
    <div class="similar-row"></div>
</section>

<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const image = params.get("image");

// basic
document.getElementById("product-name").innerText = name;
document.getElementById("product-price").innerText = "₹" + price;
document.getElementById("product-image").src = image;

// 🔥 PRODUCT DATA (REAL IMAGES)
const products = {

"Purse": {
    details: `
    <li>Material: Cotton Yarn</li>
    <li>Handmade Crochet Design</li>
    <li>Lightweight & Stylish</li>
    `,
    images: [
        "images/crochet purse.jpeg",
        "images/croc purse1.jpeg",
        "images/croc purse 2.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Anita:</b> Loved it ❤️</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Pooja:</b> Stylish 👍</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/purse1.jpeg"><p>Bag</p><span>₹1499</span></div>
    <div class="similar-card"><img src="images/purse3.jpeg"><p>Combo Purse</p><span>₹1575</span></div>
    `
},

"Madhubani Saree": {
    details: `
    <li>Material: Cotton Silk</li>
    <li>Madhubani Hand Painting</li>
    <li>Perfect for Festive Wear</li>
    `,
    images: [
        "images/Madhubani Sarees.jpeg",
        "images/Madhubani Sarees.jpeg",
        "images/Madhubani Sarees.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Riya:</b> Beautiful 😍</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Neha:</b> Nice design</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/Madhubani Sarees.jpeg"><p>Saree</p><span>₹2200</span></div>
    <div class="similar-card"><img src="images/Madhubani Sarees.jpeg"><p>Printed Saree</p><span>₹1800</span></div>
    `
},

"Applique Bedsheet": {
    details: `
    <li>Material: Cotton Fabric</li>
    <li>Applique Work</li>
    <li>King Size Bedsheet</li>
    `,
    images: [
        "images/Bedsheet.jpeg",
        "images/Bedsheet.jpeg",
        "images/Bedsheet.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Simran:</b> Comfortable 😍</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Rahul:</b> Good fabric</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/Bedsheet.jpeg"><p>Bedsheet</p><span>₹1500</span></div>
    <div class="similar-card"><img src="images/Bedsheet.jpeg"><p>Printed Bedsheet</p><span>₹1700</span></div>
    `
},

"Clay Vase": {
    details: `
    <li>Material: Ceramic</li>
    <li>Handcrafted Flower Design</li>
    <li>Multi-purpose (Decor + Fork Holder)</li>
    `,
    images: [
        "images/vase1.jpeg",
        "images/vase2.jpeg",
        "images/vase3.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Ritika:</b> So cute 😍 totally worth it!</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Aman:</b> Unique design, looks premium 👍</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/vase1.jpeg"><p>Mini Flower Vase</p><span>₹899</span></div>
    <div class="similar-card"><img src="images/vase2.jpeg"><p>Decor Holder</p><span>₹999</span></div>
    `
}
};

// apply
if(products[name]){

    document.querySelector(".product-info-section ul").innerHTML = products[name].details;

    document.querySelector(".reviews").innerHTML = products[name].reviews;

    const thumb = document.querySelector(".thumbnail-row");
    thumb.innerHTML = "";

    products[name].images.forEach(img => {
        thumb.innerHTML += `<img src="${img}" onclick="changeImage(this)">`;
    });

    document.querySelector(".similar-row").innerHTML = products[name].similar;
}

// change image
function changeImage(el){
    document.getElementById("product-image").src = el.src;
}

// rating
function rate(stars){
    document.getElementById("rating-result").innerText =
    "You rated " + stars + " stars";
}

// qty
function changeQty(val){
    let qty = document.getElementById("qty");
    let current = parseInt(qty.value);
    if(current + val >= 1){
        qty.value = current + val;
    }
}

// cart
function addToCart(){
    alert("Added to cart ✅");
}

function buyNow(){
    alert("Proceeding to buy 🚀");
}

</script>

</body>
</html>
