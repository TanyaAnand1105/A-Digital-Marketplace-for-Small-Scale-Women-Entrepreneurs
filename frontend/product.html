<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="product-body">

<header class="product-navbar">
<div class="nav-left">
<a href="shop.html" class="back-btn">⬅</a>
<h2 class="logo">Handmade Market</h2>
</div>
</header>

<section class="product-container">

<div class="product-images">

<img class="main-img" id="product-image" src="images/crochet purse.jpeg" onclick="zoomImage()">

</div>

<div class="product-details">

<h1 id="product-name">Crochet Purse</h1>

<p id="rating-result"></p>

<h2 class="price" id="product-price">₹1200</h2>

<p class="description">
Beautiful handmade product crafted by artisans.
</p>

<div class="quantity-box">
<button onclick="changeQty(-1)">-</button>
<input type="number" id="qty" value="1" min="1">
<button onclick="changeQty(1)">+</button>
</div>

<div class="buttons">
<button onclick="addToCart()">Add to Cart</button>
<button onclick="buyNow()">Buy Now</button>
</div>

</div>

</section>

<script>

// ✅ Dynamic data
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const image = params.get("image");

if(name){
    document.getElementById("product-name").innerText = name;
}

if(price){
    document.getElementById("product-price").innerText = "₹" + price;
}

if(image){
    document.getElementById("product-image").src = image;
}

// Quantity
function changeQty(val){
    let qty = document.getElementById("qty");
    let current = parseInt(qty.value);
    if(current + val >= 1){
        qty.value = current + val;
    }
}

function addToCart(){
    alert("Added to cart ✅");
}

function buyNow(){
    alert("Proceeding to buy 🚀");
}

</script>

</body>
</html>
