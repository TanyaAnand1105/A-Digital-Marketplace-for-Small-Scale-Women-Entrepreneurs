<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="product-body">

<header class="product-navbar">
    <div class="nav-left">
        <a href="shop.html" class="back-btn">⬅</a>
        <h2 class="logo">Handmade Market</h2>
    </div>
</header>

<section class="product-container">

    <div class="product-images">
        <img class="main-img" id="product-image" src="">
        <div class="thumbnail-row"></div>
    </div>

    <div class="product-details">

        <h1 id="product-name"></h1>

        <div class="star-rating">
            <span onclick="rate(1)">⭐</span>
            <span onclick="rate(2)">⭐</span>
            <span onclick="rate(3)">⭐</span>
            <span onclick="rate(4)">⭐</span>
            <span onclick="rate(5)">⭐</span>
        </div>

        <p id="rating-result"></p>

        <h2 class="price" id="product-price"></h2>

        <p class="description">
            Beautiful handmade product crafted by artisans.
        </p>

        <div class="quantity-box">
            <button onclick="changeQty(-1)">-</button>
            <input type="number" id="qty" value="1" min="1">
            <button onclick="changeQty(1)">+</button>
        </div>

        <div class="buttons">
            <button onclick="addToCart()">Add to Cart</button>
            <button onclick="buyNow()">Buy Now</button>
        </div>

    </div>

</section>

<!-- DETAILS -->
<section class="product-info-section">
    <h3>Product Details</h3>
    <ul></ul>
</section>

<!-- REVIEWS -->
<section class="reviews"></section>

<!-- SIMILAR -->
<section class="similar">
    <h3>Similar Products</h3>
    <div class="similar-row"></div>
</section>

<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const price = params.get("price");
const image = params.get("image");

document.getElementById("product-name").innerText = name;
document.getElementById("product-price").innerText = "₹" + price;
document.getElementById("product-image").src = image;

// 🔥 FULL PRODUCT DATABASE
const products = {

"Purse": {
    details: `
    <li>Material: Cotton Yarn</li>
    <li>Handmade Crochet Design</li>
    <li>Lightweight & Stylish</li>
    `,
    images: [
        "images/croc purse1.jpeg",
        "images/croc purse 2.jpeg",
        "images/croc purse 3.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Anita:</b> Beautiful purse ❤️</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Pooja:</b> Worth the price 👍</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/purse1.jpeg"><p>Handmade Bag</p><span>₹1499</span></div>
    <div class="similar-card"><img src="images/purse2.jpeg"><p>Red Purse</p><span>₹1799</span></div>
    `
},

"Madhubani Saree": {
    details: `
    <li>Material: Cotton Silk</li>
    <li>Madhubani Hand Painting</li>
    <li>Perfect for Festivals</li>
    `,
    images: [
        "images/saree1.jpeg",
        "images/saree2.jpeg",
        "images/saree3.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Riya:</b> Stunning saree 😍</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Neha:</b> Loved the design!</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/saree4.jpeg"><p>Silk Saree</p><span>₹2500</span></div>
    <div class="similar-card"><img src="images/saree5.jpeg"><p>Printed Saree</p><span>₹1800</span></div>
    `
},

"Applique Bedsheet": {
    details: `
    <li>Material: Cotton Fabric</li>
    <li>Applique Work Design</li>
    <li>King Size Bedsheet</li>
    `,
    images: [
        "images/bed1.jpeg",
        "images/bed2.jpeg",
        "images/bed3.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Simran:</b> Very comfortable 😍</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Rahul:</b> Nice fabric 👍</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/bed4.jpeg"><p>Printed Bedsheet</p><span>₹1500</span></div>
    <div class="similar-card"><img src="images/bed5.jpeg"><p>Cotton Bedsheet</p><span>₹1700</span></div>
    `
},

"Clay Vase": {
    details: `
    <li>Material: Natural Clay</li>
    <li>Handcrafted Design</li>
    <li>Perfect for Home Decor</li>
    `,
    images: [
        "images/vase1.jpeg",
        "images/vase2.jpeg",
        "images/vase3.jpeg"
    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Karan:</b> Looks premium 😍</p></div>
    <div class="review">⭐ ⭐ ⭐ ⭐ ☆ <p><b>Meena:</b> Good quality 👍</p></div>
    `,
    similar: `
    <div class="similar-card"><img src="images/vase4.jpeg"><p>Decor Vase</p><span>₹999</span></div>
    <div class="similar-card"><img src="images/vase5.jpeg"><p>Clay Pot</p><span>₹799</span></div>
    `
}

};

// 🔥 APPLY DATA
if(products[name]){

    document.querySelector(".product-info-section ul").innerHTML = products[name].details;

    document.querySelector(".reviews").innerHTML = products[name].reviews;

    const thumb = document.querySelector(".thumbnail-row");
    thumb.innerHTML = "";

    products[name].images.forEach(img => {
        thumb.innerHTML += `<img src="${img}" onclick="changeImage(this)">`;
    });

    document.querySelector(".similar-row").innerHTML = products[name].similar;
}

// change image
function changeImage(el){
    document.getElementById("product-image").src = el.src;
}

// rating
function rate(stars){
    document.getElementById("rating-result").innerText =
    "You rated " + stars + " stars";
}

// qty
function changeQty(val){
    let qty = document.getElementById("qty");
    let current = parseInt(qty.value);
    if(current + val >= 1){
        qty.value = current + val;
    }
}

// cart
function addToCart(){
    alert("Added to cart ✅");
}

function buyNow(){
    alert("Proceeding to buy 🚀");
}

</script>

</body>
</html>
