<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="shop-page">

<header class="shop-navbar">

    <a href="index.html" class="back-btn">⬅</a>
    <h1 class="logo">Handmade Market</h1>

    <div class="search-box">
        <input type="text" placeholder="Search handmade products...">
        <button>🔍</button>
    </div>

    <div class="nav-icons">

        <a href="login.html" class="icon-box">
            <span class="icon">😊</span>
            <span>Account</span>
        </a>

        <a href="wishlist.html" class="icon-box">
            <span class="icon">❤</span>
            <span>Wishlist</span>
        </a>

        <a href="cart.html" class="icon-box">
            <span class="icon">🛒</span>
            <span>Cart</span>
        </a>

    </div>

</header>

<!-- CATEGORY SECTION -->
<section class="categories">

    <div class="category">
        <img src="images/Bags.jpeg"><p>Bags</p>
    </div>

    <div class="category">
        <img src="images/Jewellery.jpeg"><p>Jewellery</p>
    </div>

    <div class="category">
        <img src="images/Clothes.jpeg"><p>Clothes</p>
    </div>

    <div class="category">
        <img src="images/Candles.jpeg"><p>Candles</p>
    </div>

    <div class="category">
        <img src="images/Crochet.jpeg"><p>Flowers</p>
    </div>

</section>

<!-- DEALS -->
<h2 class="section-title">Deals of the Day</h2>

<section class="products">

    <!-- PURSE -->
    <div class="product-card">
        <a href="product.html?name=Purse&price=1200&type=purse&image=images/crochet purse.jpeg">
            <img src="images/crochet purse.jpeg">
        </a>
        <h3>Purse</h3>
        <p>₹1200</p>
        <button>Add to Cart</button>
    </div>

    <!-- SAREE -->
    <div class="product-card">
        <a href="product.html?name=Madhubani Saree&price=2000&type=saree&image=images/Madhubani Sarees.jpeg">
            <img src="images/Madhubani Sarees.jpeg">
        </a>
        <h3>Madhubani Saree</h3>
        <p>₹2000</p>
        <button>Add to Cart</button>
    </div>

    <!-- BEDSHEET -->
    <div class="product-card">
        <a href="product.html?name=Applique Bedsheet&price=1800&type=bedsheet&image=images/Bedsheet.jpeg">
            <img src="images/Bedsheet.jpeg">
        </a>
        <h3>Applique Bedsheet</h3>
        <p>₹1800</p>
        <button>Add to Cart</button>
    </div>

    <!-- VASE -->
    <div class="product-card">
        <a href="product.html?name=Clay Vase&price=749&type=vase&image=images/Clay vase.jpeg">
            <img src="images/Clay vase.jpeg">
        </a>
        <h3>Clay Vase</h3>
        <p>₹749</p>
        <button>Add to Cart</button>
    </div>

</section>

<!-- PROMO -->
<section class="promo">

    <a href="shop.html" class="promo-card">
        <img src="images/Crochet Toys.jpeg">
        <h3>Crochet Toys</h3>
        <p>Up to 60% Off</p>
    </a>

    <a href="shop.html" class="promo-card">
        <img src="images/Handmade Baskets.jpeg">
        <h3>Handmade Baskets</h3>
        <p>Up to 70% Off</p>
    </a>

    <a href="shop.html" class="promo-card">
        <img src="images/Home Decor.jpeg">
        <h3>Home Decor</h3>
        <p>Up to 45% Off</p>
    </a>

</section>

</body>
</html>
