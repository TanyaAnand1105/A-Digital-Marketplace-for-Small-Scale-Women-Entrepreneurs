<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="shop-page">

<header class="shop-navbar">

    <a href="index.html" class="back-btn">⬅</a>
    <h1 class="logo">Handmade Market</h1>

    <div class="search-box">
        <input type="text" placeholder="Search handmade products...">
        <button>🔍</button>
    </div>

    <div class="nav-icons">
        <a href="login.html" class="icon-box">😊 Account</a>
        <a href="wishlist.html" class="icon-box">❤ Wishlist</a>
        <a href="cart.html" class="icon-box">🛒 Cart</a>
    </div>

</header>

<h2 class="section-title">Deals of the Day</h2>

<section class="products">

    <!-- PURSE -->
    <div class="product-card">
        <a href="product.html?name=Purse&price=1200&image=images/crochet purse.jpeg">
            <img src="images/crochet purse.jpeg">
        </a>
        <h3>Purse</h3>
        <p>₹1200</p>
    </div>

    <!-- SAREE -->
    <div class="product-card">
        <a href="product.html?name=Madhubani Saree&price=2000&image=images/Madhubani Sarees.jpeg">
            <img src="images/Madhubani Sarees.jpeg">
        </a>
        <h3>Madhubani Saree</h3>
        <p>₹2000</p>
    </div>

    <!-- BEDSHEET -->
    <div class="product-card">
        <a href="product.html?name=Applique Bedsheet&price=1800&image=images/Bedsheet.jpeg">
            <img src="images/Bedsheet.jpeg">
        </a>
        <h3>Applique Bedsheet</h3>
        <p>₹1800</p>
    </div>

    <!-- VASE -->
    <div class="product-card">
        <a href="product.html?name=Clay Vase&price=749&image=images/Clay vase.jpeg">
            <img src="images/Clay vase.jpeg">
        </a>
        <h3>Clay Vase</h3>
        <p>₹749</p>
    </div>

</section>

</body>
</html>
