<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – KalaKriti</title>
  <meta name="description" content="Your shopping cart on KalaKriti.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hdr">
  <div class="page-hdr-cont">
    <h1>My <span style="color:var(--pink-mid)">Cart</span></h1>
    <p>Review your items before checkout</p>
  </div>
</div>

<div class="container py-5">
  <div class="row g-4" id="cartContent">
    <div class="col-12 text-center py-5"><div style="font-size:2rem">⏳</div><p>Loading cart...</p></div>
  </div>
</div>

<footer class="kk-footer">
  <div class="container">
    <div class="footer-bottom text-center">© 2026 KalaKriti. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/data.js"></script>
<script src="../static/js/navbar.js"></script>
<script>
  renderNavbar('cart');

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cartContent');

    if (!cart.length) {
      container.innerHTML = `
        <div class="col-12">
          <div class="empty-state">
            <div class="empty-icon">🛒</div>
            <h4>Your cart is empty</h4>
            <p>Add some handmade treasures to your cart!</p>
            <a href="shop.html" class="btn-pink mt-3">Continue Shopping</a>
          </div>
        </div>`;
      return;
    }

    const subtotal = getCartTotal();
    const shipping = subtotal >= 999 ? 0 : 99;
    const total = subtotal + shipping;

    container.innerHTML = `
      <div class="col-lg-8">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
          <h5 style="font-weight:700;color:var(--black)">Cart Items (${cart.length})</h5>
          <button onclick="if(confirm('Clear cart?')){clearCart();renderCart()}" style="background:none;border:none;color:var(--pink);font-size:.83rem;font-weight:600;cursor:pointer">🗑 Clear Cart</button>
        </div>
        ${cart.map(item => `
          <div class="cart-item" id="item-${item.id}">
            <img class="cart-item-img" src="../static/images/${item.image}" alt="${item.name}" onerror="this.src='../static/images/banner.jpg'">
            <div style="flex:1;min-width:0">
              <div class="product-cat">${item.category}</div>
              <div style="font-weight:700;font-size:.9rem;color:var(--black);margin-bottom:4px">${item.name}</div>
              <div style="font-size:.8rem;color:var(--gray);margin-bottom:8px">By ${item.seller || 'Artisan'}</div>
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeItemQty('${item.id}', -1)">−</button>
                  <span class="qty-val" id="qty-${item.id}">${item.qty}</span>
                  <button class="qty-btn" onclick="changeItemQty('${item.id}', 1)">+</button>
                </div>
                <div style="font-weight:800;color:var(--pink);font-size:1rem">${formatPrice(item.price * item.qty)}</div>
                <button onclick="removeItem('${item.id}')" style="background:none;border:none;color:#c62828;cursor:pointer;font-size:.8rem;font-weight:600">✕ Remove</button>
              </div>
            </div>
          </div>`).join('')}
        <a href="shop.html" style="color:var(--pink);font-size:.85rem;font-weight:600;text-decoration:none">← Continue Shopping</a>
      </div>

      <div class="col-lg-4">
        <div class="cart-summary">
          <h5 style="font-weight:800;color:var(--black);margin-bottom:18px">Order Summary</h5>
          <div class="summary-row"><span>Subtotal (${cart.reduce((s,i)=>s+i.qty,0)} items)</span><span style="font-weight:600">${formatPrice(subtotal)}</span></div>
          <div class="summary-row"><span>Shipping</span><span style="font-weight:600;color:${shipping===0?'green':'var(--black)'}">${shipping===0?'FREE':formatPrice(shipping)}</span></div>
          ${shipping > 0 ? `<div style="font-size:.75rem;color:var(--gray);padding:5px 0">Add ${formatPrice(999 - subtotal)} more for free shipping</div>` : ''}
          <div class="summary-row" style="margin-top:8px">
            <span style="font-weight:700">Total</span>
            <span class="summary-total">${formatPrice(total)}</span>
          </div>
          <button onclick="checkout()" class="btn-pink w-100 justify-content-center mt-4">
            Proceed to Checkout →
          </button>
          <div style="text-align:center;margin-top:14px;font-size:.75rem;color:var(--gray)">🔒 Secure checkout · All payments encrypted</div>
          <div style="margin-top:16px;padding:12px;background:var(--pink-light);border-radius:8px">
            <div style="font-size:.78rem;font-weight:600;color:var(--pink-dark);margin-bottom:6px">🎁 Have a coupon?</div>
            <div style="display:flex;gap:8px">
              <input type="text" id="couponInput" placeholder="Enter code" class="form-control" style="font-size:.8rem;padding:7px 12px;border-radius:7px">
              <button onclick="applyCoupon()" style="background:var(--pink);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-size:.8rem;cursor:pointer;font-weight:600">Apply</button>
            </div>
          </div>
        </div>
      </div>`;
  }

  function changeItemQty(id, delta) {
    const el = document.getElementById('qty-' + id);
    const newQty = Math.max(1, parseInt(el.textContent) + delta);
    updateCartQty(id, newQty);
    renderCart();
    renderNavbar('cart');
  }

  function removeItem(id) {
    removeFromCart(id);
    renderCart();
    renderNavbar('cart');
    showToast('Item removed from cart');
  }

  function checkout() {
    if (!getCurrentUser()) { window.location.href = 'login.html'; return; }
    if (confirm('Proceed to checkout?\n\nThis is a demo — your order will be saved locally.')) {
      const order = { id: 'ORD' + Date.now(), items: getCart(), total: getCartTotal() + (getCartTotal() >= 999 ? 0 : 99), date: new Date().toLocaleDateString('en-IN'), status: 'Confirmed' };
      const orders = JSON.parse(localStorage.getItem('kk_orders') || '[]');
      orders.unshift(order);
      localStorage.setItem('kk_orders', JSON.stringify(orders));
      clearCart();
      showToast('🎉 Order placed successfully!');
      setTimeout(() => window.location.href = 'profile.html', 1500);
    }
  }

  function applyCoupon() {
    const code = document.getElementById('couponInput').value.trim().toUpperCase();
    if (code === 'KALA10') showToast('🎉 Coupon applied! 10% off');
    else showToast('Invalid coupon code', 'error');
  }

  renderCart();
</script>
</body>
</html>
