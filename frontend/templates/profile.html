<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – KalaKriti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hdr">
  <div class="page-hdr-cont">
    <h1>My <span style="color:var(--pink-mid)">Profile</span></h1>
    <p>Manage your account and orders</p>
  </div>
</div>

<div class="container py-5">
  <div class="row g-4">
    <!-- Profile Info -->
    <div class="col-lg-4">
      <div class="profile-card text-center">
        <div class="profile-avatar" id="avatarEl">?</div>
        <h4 id="userName" style="font-weight:800;color:var(--black);margin-bottom:4px"></h4>
        <div id="userRole" style="display:inline-block;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:600;margin-bottom:18px"></div>
        <div id="userInfo"></div>
        <button onclick="logoutUser()" class="btn-pink w-100 justify-content-center mt-4" style="background:var(--gradient-dark)">
          Logout →
        </button>
      </div>
    </div>

    <!-- Orders + Wishlist summary -->
    <div class="col-lg-8">
      <!-- Quick Stats -->
      <div class="row g-3 mb-4">
        <div class="col-4">
          <div class="stat-card">
            <div class="stat-icon">📦</div>
            <div class="stat-val" id="orderCount">0</div>
            <div class="stat-lbl">Orders</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card">
            <div class="stat-icon">❤️</div>
            <div class="stat-val" id="wlCount">0</div>
            <div class="stat-lbl">Wishlist</div>
          </div>
        </div>
        <div class="col-4">
          <div class="stat-card">
            <div class="stat-icon">🛒</div>
            <div class="stat-val" id="cartItemCount">0</div>
            <div class="stat-lbl">In Cart</div>
          </div>
        </div>
      </div>

      <!-- Order History -->
      <div class="profile-card">
        <h5 style="font-weight:800;color:var(--black);margin-bottom:18px">📦 Order History</h5>
        <div id="ordersContainer">
          <div class="text-center py-3"><p style="color:var(--gray);font-size:.875rem">Loading orders...</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="kk-footer">
  <div class="container"><div class="footer-bottom text-center">© 2026 KalaKriti. All rights reserved.</div></div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/data.js"></script>
<script src="../static/js/navbar.js"></script>
<script>
  renderNavbar('profile');
  const user = getCurrentUser();
  if (!user) window.location.href = 'login.html';

  // Fill profile info
  document.getElementById('avatarEl').textContent = user.name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = user.name;
  const roleEl = document.getElementById('userRole');
  roleEl.textContent = user.role === 'seller' ? '🏪 Seller' : '🛍 Buyer';
  roleEl.style.background = user.role === 'seller' ? 'var(--pink-light)' : '#e8f5e9';
  roleEl.style.color = user.role === 'seller' ? 'var(--pink-dark)' : '#2e7d32';

  document.getElementById('userInfo').innerHTML = `
    <div class="info-row"><span class="info-lbl">📧 Email</span><span style="font-size:.875rem;color:var(--dark)">${user.email}</span></div>
    <div class="info-row"><span class="info-lbl">👤 Role</span><span style="font-size:.875rem;color:var(--dark);text-transform:capitalize">${user.role}</span></div>
    <div class="info-row"><span class="info-lbl">📅 Member Since</span><span style="font-size:.875rem;color:var(--dark)">${new Date().toLocaleDateString('en-IN',{year:'numeric',month:'long'})}</span></div>`;

  // Counts
  document.getElementById('orderCount').textContent = JSON.parse(localStorage.getItem('kk_orders') || '[]').length;
  document.getElementById('wlCount').textContent = getWishlist().length;
  document.getElementById('cartItemCount').textContent = getCart().reduce((s, i) => s + i.qty, 0);

  // Orders
  const orders = JSON.parse(localStorage.getItem('kk_orders') || '[]');
  const oc = document.getElementById('ordersContainer');
  if (!orders.length) {
    oc.innerHTML = `<div class="empty-state" style="padding:30px 0"><div class="empty-icon">📦</div><h4>No orders yet</h4><p>Your confirmed orders will appear here</p><a href="shop.html" class="btn-pink mt-3">Start Shopping</a></div>`;
  } else {
    oc.innerHTML = orders.map(o => `
      <div style="border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;transition:var(--transition)" onmouseover="this.style.borderColor='var(--pink)'" onmouseout="this.style.borderColor='var(--border)'">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">
          <div>
            <div style="font-weight:700;font-size:.9rem;color:var(--black)">${o.id}</div>
            <div style="font-size:.78rem;color:var(--gray)">${o.date}</div>
          </div>
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-weight:800;color:var(--pink)">${formatPrice(o.total)}</span>
            <span style="background:#e8f5e9;color:#2e7d32;padding:4px 10px;border-radius:20px;font-size:.72rem;font-weight:700">✅ ${o.status}</span>
          </div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${(o.items||[]).slice(0,4).map(item => `
            <img src="../static/images/${item.image}" style="width:46px;height:46px;object-fit:cover;border-radius:6px;border:1px solid var(--border)" onerror="this.style.display='none'" title="${item.name}">`).join('')}
          ${o.items && o.items.length > 4 ? `<div style="width:46px;height:46px;border-radius:6px;background:var(--pink-light);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--pink)">+${o.items.length-4}</div>` : ''}
        </div>
      </div>`).join('');
  }

  // Seller-specific shortcut
  if (user.role === 'seller') {
    document.querySelector('.container.py-5').insertAdjacentHTML('afterbegin',
      `<div class="alert" style="background:var(--pink-light);border:1px solid var(--pink-mid);border-radius:12px;color:var(--pink-dark);margin-bottom:20px">
        🏪 You are a seller. <a href="seller_dashboard.html" style="color:var(--pink);font-weight:700">Go to Seller Dashboard →</a>
      </div>`);
  }
</script>
</body>
</html>
