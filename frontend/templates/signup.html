<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - Kala Kriti</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="signup-container">
        <h2>Create an Account</h2>
        <form action="/perform_signup" method="POST" onsubmit="handleSignup(event)">
    <input type="text" id="signup-name" name="username" placeholder="Full Name" required>
    <input type="email" id="signup-email" name="email" placeholder="Email Address" required>
    <input type="password" id="signup-password" name="password" placeholder="Password" required>
    <input type="password" id="signup-confirm" placeholder="Confirm Password" required>
    <button type="submit">Sign Up</button>
</form>
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
    <script>
function handleSignup(event) {
    event.preventDefault(); 

    const name = document.getElementById("signup-name").value;
    const email = document.getElementById("signup-email").value;
    const pass = document.getElementById("signup-password").value;
    const confirm = document.getElementById("signup-confirm").value;

    if (pass !== confirm) {
        alert("Oops! Passwords do not match. Please check again.");
        return; 
    }

    console.log("Success! Registering user:", email);
    event.target.submit(); 
}
</script>
</body>
</html>
