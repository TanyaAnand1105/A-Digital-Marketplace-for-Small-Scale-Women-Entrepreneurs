<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist – KalaKriti</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hdr">
  <div class="page-hdr-cont">
    <h1>My <span style="color:var(--pink-mid)">Wishlist</span></h1>
    <p>Products you've saved for later</p>
  </div>
</div>

<div class="container py-5">
  <div id="wishlistContent">
    <div class="text-center py-5"><div style="font-size:2rem">⏳</div><p>Loading wishlist...</p></div>
  </div>
</div>

<footer class="kk-footer">
  <div class="container">
    <div class="footer-bottom text-center">© 2026 KalaKriti. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/data.js"></script>
<script src="../static/js/navbar.js"></script>
<script>
  renderNavbar('wishlist');

  async function init() {
    if (!getCurrentUser()) { window.location.href = 'login.html'; return; }
    const wl = getWishlist();
    const el = document.getElementById('wishlistContent');

    if (!wl.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">❤️</div><h4>Your wishlist is empty</h4><p>Tap the heart icon on any product to save it here</p><a href="shop.html" class="btn-pink mt-3">Browse Products</a></div>`;
      return;
    }

    const all = await getAllProducts();
    const saved = all.filter(p => wl.includes(p.id));

    if (!saved.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">❤️</div><h4>Your wishlist is empty</h4><a href="shop.html" class="btn-pink mt-3">Browse Products</a></div>`;
      return;
    }

    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px">
        <h5 style="font-weight:700;color:var(--black)">${saved.length} saved item${saved.length!==1?'s':''}</h5>
        <button onclick="clearWishlist()" style="background:none;border:none;color:var(--pink);font-size:.83rem;font-weight:600;cursor:pointer">🗑 Clear Wishlist</button>
      </div>
      <div class="row g-4">
        ${saved.map(p => `<div class="col-6 col-md-4 col-lg-3" id="wcard-${p.id}">${productCardHTML(p)}</div>`).join('')}
      </div>`;
  }

  function clearWishlist() {
    if (confirm('Clear your entire wishlist?')) {
      localStorage.removeItem('kk_wishlist');
      showToast('Wishlist cleared');
      init();
    }
  }

  // Override toggle to re-render
  const origToggle = toggleWishlist;
  window.handleWishlist = function(id, btn) {
    toggleWishlist(id);
    const card = document.getElementById('wcard-' + id);
    if (card) { card.style.opacity = '0'; card.style.transition = 'opacity .3s'; setTimeout(() => { card.remove(); }, 300); }
  };

  init();
</script>
</body>
</html>
