<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Kala Kriti</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">

<div class="login-container">

<div class="login-image">
    <img src="{{ url_for('static', filename='images/login-art.png') }}" alt="Login Art" style="max-width: 100%; border-radius: 15px;">
</div>

<div class="login-form">
    <h2 style="color: #d81b60;">Reset Password</h2>
    <p style="color: #666; margin-bottom: 20px;">Enter your email to receive a password reset link</p>

    <form method="POST" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; margin-bottom: 5px; color: #333; font-weight: bold;">Email Address</label>
            <input type="email" placeholder="Enter your registered email" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px;">
        </div>

        <button type="submit" style="width: 100%; padding: 12px; background: #d81b60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s;">Send Reset Link</button>

        <div class="login-links" style="text-align: center;">
            <a href="{{ url_for('index') }}" style="color: #007bff; text-decoration: none;">Back to Login</a>
        </div>
    </form>
</div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
