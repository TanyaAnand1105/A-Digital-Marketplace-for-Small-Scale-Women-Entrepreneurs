<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product – KalaKriti</title>
  <meta name="description" content="View product details on KalaKriti.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<div id="navbar"></div>

<div class="page-hdr" style="padding:30px 0">
  <nav aria-label="breadcrumb" class="page-hdr-cont">
    <ol class="breadcrumb justify-content-center breadcrumb-dark" style="background:transparent;margin:0">
      <li class="breadcrumb-item"><a href="index.html">Home</a></li>
      <li class="breadcrumb-item"><a href="shop.html">Shop</a></li>
      <li class="breadcrumb-item active" id="bcName">Product</li>
    </ol>
  </nav>
</div>

<div class="container py-5">
  <div id="productDetail">
    <div class="text-center py-5"><div style="font-size:2rem">⏳</div><p style="color:var(--gray)">Loading product...</p></div>
  </div>
  <!-- Related Products -->
  <div class="mt-5 pt-4" id="relatedSection" style="display:none">
    <h3 class="section-title text-start mb-2">You May <span>Also Like</span></h3>
    <div class="divider" style="margin:10px 0 24px"></div>
    <div class="row g-4" id="relatedGrid"></div>
  </div>
</div>

<!-- Footer -->
<footer class="kk-footer">
  <div class="container">
    <div class="footer-bottom text-center">© 2026 KalaKriti. All rights reserved.</div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/js/data.js"></script>
<script src="../static/js/navbar.js"></script>
<script>
  renderNavbar('shop');
  let currentProduct = null;

  // Extra images mapping for categories
  const extraImages = {
    bags: ['bag.jpg','Purses.jpeg','crochet purse.jpeg','croc purse1.jpeg','purse1.jpeg'],
    sarees: ['saree1.jpeg','saree2.jpeg','saree3.jpeg','saree4.jpeg'],
    pottery: ['vase.jpeg','vase1.jpeg','vase4.jpeg','vase5.jpeg'],
    bedsheets: ['Bedsheet.jpeg','Bedsheet1.jpeg','Bedsheet2.jpeg','Bedsheet3.jpeg'],
    jewellery: ['Jewellery.jpeg','jewellery.jpg'],
    art: ['Art.jpeg','art piece.jpeg','art piece 2.jpeg','art piece 3.jpeg'],
    decor: ['Decor.jpeg','wood decor.jpeg','Candles.jpeg','Handmade Baskets.jpeg'],
    crochet: ['Crochet.jpeg','Crochet Toys.jpeg','Crochet products.jpeg'],
    clothes: ['Clothes.jpeg','sweater.jpg']
  };

  async function init() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { window.location.href = 'shop.html'; return; }

    const products = await getAllProducts();
    currentProduct = products.find(p => p.id === id);
    if (!currentProduct) { window.location.href = 'shop.html'; return; }

    document.title = currentProduct.name + ' – KalaKriti';
    document.getElementById('bcName').textContent = currentProduct.name;

    const imgs = extraImages[currentProduct.category] || [currentProduct.image];
    const allImgs = [currentProduct.image, ...imgs.filter(i => i !== currentProduct.image)].slice(0, 4);
    const disc = Math.round((currentProduct.originalPrice - currentProduct.price) / currentProduct.originalPrice * 100);
    const wl = isWishlisted(currentProduct.id);

    document.getElementById('productDetail').innerHTML = `
      <div class="row g-5">
        <div class="col-lg-6">
          <img id="mainImg" src="../static/images/${allImgs[0]}" alt="${currentProduct.name}" class="detail-img-main mb-3" onerror="this.src='../static/images/banner.jpg'">
          <div class="d-flex gap-2 flex-wrap">
            ${allImgs.map((img, i) => `
              <img src="../static/images/${img}" alt="" class="detail-thumb ${i===0?'active':''}" onclick="switchImg(this,'../static/images/${img}')" onerror="this.style.display='none'">`).join('')}
          </div>
        </div>
        <div class="col-lg-6">
          <div class="product-cat mb-2">${currentProduct.category.toUpperCase()}</div>
          <h1 style="font-size:1.8rem;font-weight:800;color:var(--black);margin-bottom:12px">${currentProduct.name}</h1>
          <div style="margin-bottom:14px">${renderStars(currentProduct.rating)} <span style="color:var(--gray);font-size:.85rem">(${currentProduct.reviews} reviews)</span></div>
          <div class="d-flex align-items-center gap-3 mb-4">
            <div class="detail-price">${formatPrice(currentProduct.price)}</div>
            ${currentProduct.originalPrice > currentProduct.price ? `<div class="detail-orig">${formatPrice(currentProduct.originalPrice)}</div>` : ''}
            ${disc > 0 ? `<span style="background:var(--pink);color:#fff;padding:4px 10px;border-radius:20px;font-size:.75rem;font-weight:700">${disc}% OFF</span>` : ''}
          </div>
          <p style="color:var(--gray);font-size:.9rem;line-height:1.8;margin-bottom:22px">${currentProduct.description}</p>
          
          <div class="seller-chip mb-4">🎨 By ${currentProduct.seller || 'Artisan'}</div>

          <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <span class="qty-val" id="qty">1</span>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
            </div>
            <span style="font-size:.82rem;color:${currentProduct.stock>5?'green':'var(--pink)'};font-weight:600">
              ${currentProduct.stock > 0 ? `✅ ${currentProduct.stock} in stock` : '❌ Out of stock'}
            </span>
          </div>

          <div class="d-flex gap-3 flex-wrap mb-4">
            <button onclick="handleAddToCart()" class="btn-pink" style="flex:1" id="cartBtn">🛒 Add to Cart</button>
            <button onclick="handleWishlist('${currentProduct.id}', this)" class="btn-outline-pink ${wl?'active':''}" id="wlBtn">
              ${wl?'❤ Wishlisted':'🤍 Wishlist'}
            </button>
          </div>

          <div style="background:var(--light-gray);border-radius:12px;padding:16px">
            <div class="d-flex gap-4 flex-wrap">
              <div style="font-size:.8rem;text-align:center"><div style="font-size:1.2rem">🚚</div><div style="font-weight:600">Free Shipping</div><div style="color:var(--gray)">On orders ₹999+</div></div>
              <div style="font-size:.8rem;text-align:center"><div style="font-size:1.2rem">🔄</div><div style="font-weight:600">Easy Returns</div><div style="color:var(--gray)">7-day policy</div></div>
              <div style="font-size:.8rem;text-align:center"><div style="font-size:1.2rem">✅</div><div style="font-weight:600">Authentic</div><div style="color:var(--gray)">100% handmade</div></div>
            </div>
          </div>
        </div>
      </div>`;

    // Related products
    const related = (await getAllProducts()).filter(p => p.category === currentProduct.category && p.id !== currentProduct.id).slice(0, 4);
    if (related.length) {
      document.getElementById('relatedSection').style.display = 'block';
      document.getElementById('relatedGrid').innerHTML = related.map(p => `<div class="col-6 col-md-3">${productCardHTML(p)}</div>`).join('');
    }
  }

  function switchImg(thumb, src) {
    document.getElementById('mainImg').src = src;
    document.querySelectorAll('.detail-thumb').forEach(t => t.classList.remove('active'));
    thumb.classList.add('active');
  }

  function changeQty(delta) {
    const el = document.getElementById('qty');
    const val = Math.max(1, Math.min(10, parseInt(el.textContent) + delta));
    el.textContent = val;
  }

  function handleAddToCart() {
    if (!getCurrentUser()) { window.location.href = 'login.html'; return; }
    const qty = parseInt(document.getElementById('qty').textContent);
    addToCart(currentProduct, qty);
    const btn = document.getElementById('cartBtn');
    btn.textContent = '✅ Added!';
    setTimeout(() => btn.textContent = '🛒 Add to Cart', 2000);
  }

  init();
</script>
</body>
</html>
