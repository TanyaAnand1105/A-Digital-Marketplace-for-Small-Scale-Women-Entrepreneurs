<!DOCTYPE html>
<html>

<head>
<title>Product</title>
<link rel="stylesheet" href="../static/css/style.css">
</head>

<body class="product-body">

<header class="product-navbar">
    <div class="nav-left">
        <a href="shop.html" class="back-btn">⬅</a>
        <h2 class="logo">KalaKriti</h2>
    </div>
</header>

<section class="product-container">

<div class="product-images">
    <img class="main-img" id="product-image">
    <div class="thumbnail-row"></div>
</div>

<div class="product-details">

<h1 id="product-name"></h1>

<div class="star-rating">
<span onclick="rate(1)">⭐</span>
<span onclick="rate(2)">⭐</span>
<span onclick="rate(3)">⭐</span>
<span onclick="rate(4)">⭐</span>
<span onclick="rate(5)">⭐</span>
</div>

<p id="rating-result"></p>

<h2 id="product-price"></h2>

<p class="description">
Beautiful handmade product crafted by artisans.
</p>

<div class="quantity-box">
<button onclick="changeQty(-1)">-</button>
<input type="number" id="qty" value="1" min="1">
<button onclick="changeQty(1)">+</button>
</div>

<div class="buttons">
<button onclick="addToCart()">Add to Cart</button>
<button onclick="buyNow()">Buy Now</button>
</div>

</div>

</section>

<!-- DETAILS -->
<section class="product-info-section">
<h3>Product Details</h3>
<ul></ul>
</section>

<!-- REVIEWS -->
<section class="reviews"></section>

<!-- SIMILAR -->
<section class="similar">
<h3>Similar Products</h3>
<div class="similar-row"></div>
</section>

<script>

// URL params
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const price = params.get("price");
const image = params.get("image");

// basic info
document.getElementById("product-name").innerText = name;
document.getElementById("product-price").innerText = "₹" + price;
document.getElementById("product-image").src = "../static/" + image;


// 🔐 LOGIN CHECK
function checkLogin(){
  if(localStorage.getItem("isLoggedIn") !== "true"){
    window.location.href = "login.html";
    return false;
  }
  return true;
}

// 🛒 CART
function addToCart(){
  if(!checkLogin()) return;
  alert("Added to cart 🛒");
}

// 💳 BUY
function buyNow(){
  if(!checkLogin()) return;
  alert("Proceeding to buy 🚀");
}


// 🔥 PRODUCT DATA
const products = {

`,
similar: `

<div class="similar-card"><img src="../static/images/purse2.jpeg"><p>Combo Purse</p><span>₹1575</span></div>

<div class="review">⭐⭐⭐⭐ <p><b>Neha:</b> Nice design</p></div>
`,
similar: `
<div class="similar-card"><img src="../static/images/saree4.jpeg"><p>Bandhani Saree</p><span>₹2200</span></div>
<div class="similar-card"><img src="../static/images/saree5.jpeg"><p>Printed Saree</p><span>₹1800</span></div>

    ],
    reviews: `

    similar: `

    `,
    images: [
        "../static/images/vase1.jpeg",
        "../static/images/vase2.jpeg",

    ],
    reviews: `
    <h3>Customer Reviews</h3>
    <div class="review">⭐ ⭐ ⭐ ⭐ ⭐ <p><b>Ritika:</b> So cute 😍 totally worth it!</p></div>

    `,
    similar: `

    <div class="similar-card"><img src="../static/images/vase8.jpeg"><p>Earthen Vase</p><span>₹799</span></div>
    `
}


};


// APPLY DATA
if(products[name]){

document.querySelector(".product-info-section ul").innerHTML = products[name].details;

document.querySelector(".reviews").innerHTML = products[name].reviews;

const thumb = document.querySelector(".thumbnail-row");
thumb.innerHTML = "";

products[name].images.forEach(img => {
thumb.innerHTML += `<img src="${img}" onclick="changeImage(this)">`;
});

document.querySelector(".similar-row").innerHTML = products[name].similar;

}


// CHANGE IMAGE
function changeImage(el){
document.getElementById("product-image").src = el.src;
}


// RATING
function rate(stars){
document.getElementById("rating-result").innerText =
"You rated " + stars + " stars";
}


// QUANTITY
function changeQty(val){
let qty = document.getElementById("qty");
let current = parseInt(qty.value);
if(current + val >= 1){
qty.value = current + val;
}
}

</script>

<script src="../static/js/script.js"></script>

</body>
</html>
